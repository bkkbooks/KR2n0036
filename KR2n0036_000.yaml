body:
  text: 求古録目録類二金石之屬提要臣等謹案求古録一卷國朝顧炎武撰炎武有左傳杜解補正已著録炎武性好逺遊足跡幾遍天下搜金石之文手自抄纂凡已見方志者不録現有拓本者不録近代文集尚存者不録上自漢曹全碑下至明健文霍山碑共得五十五種每刻必載全文蓋用洪適𨽻釋之例仍皆志其地理考其建立之由古字篆𨽻一一注釋其中官職年月多可與正史相參如茶荼準准張弡等字亦可以補正字書之訛炎武别有金石文字記但載跋尾不若此編之詳明也惟曹全碑題中平二年十月丙辰造以後漢書考之靈帝本紀是年十月有庚寅距丙辰前二十六日天文志是年十月有癸亥距丙辰後七日其間不得有丙辰頗疑是碑之僞據潛研堂金石文跋尾以長厯推之始知是年十月丙申朔丙辰為月之二十一日癸亥為月之二十八日實無庚寅並證以譙敏碑稱中平二年三月九日戊寅靈帝本紀及五行志並稱中平三年五月壬辰晦干支日數一一相符乃本紀之誤非碑之僞炎武猶未及詳辨是則考證之偶踈耳乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀求古録原序豫自少時即好求訪古人金石之文而猶不甚解及讀歐陽公集古録乃知其事多與史書相證明可以補闕正訛殆不但詞翰之工而已比二十年間周遊天下所至名山巨鎮祠廟伽藍之跡無不搜尋登危峰探窈壑捫落石履荒榛伐頽垣畚朽壤其可讀者必手自抄録得一文為前人所未見者輒喜而不寐念古人遺刻且日逺日湮後之人未必如豫即如豫而數十百年之後又當磨滅幾許又歐陽趙氏二録僅有其目而不著其文良以卷帙浩繁難以盡載而好古之君子不無遺憾乃取篋中所得重為刪正去其大半擇可傳者録之以貽諸後人其髙文大篇已見于方志者不録碑刻之摹拓而傳于世者不録近代詞人之作多有文集者不録在乎闡幽表微備史乘之遺存前古之制然以布衣之賤出無僕馬往往懷毫䑛墨躑躅于山林猿鳥之間而北方之人鮮能識字其或限于聞見窘于日力而山髙水深為登涉之所不及者即所至之地亦豈無挂漏又望後人之同此好者繼我而録之也崑山顧炎武序求古録原序欽定四庫全書求古録崑山顧炎武撰唐景雲二年敕景雲二年六月二十三日皇帝敬慿太清觀道士楊太希于名山所燒香供養惟靈藴祕凝真含幽綜妙類髙旻之亭育同覆載之陶鈞蓄泄煙雲蔽虧日月五枝標秀八桂流芳翠嶺萬尋青溪千刃古仞刃兩字通用魏橫海將軍吕君碑仞字作刃霓裳戾止恆為碧落之庭鶴駕來游即是玉京之域百祥覃于逺邇五福被于黎元往帝所以馳心前王由其載想朕恭膺寶位嗣守昌圖恐百姓之不寧慮八方之未泰式陳香薦用表深𠂻實冀明靈降兹休祉所願從今己後浹㝢常安朕躬男女六姻永保如山之夀國朝官寮萬姓同符擊壤之歡魚鳥遂性于飛沈夷狄歸心于邉徼實希靈鑒用副翹誠今因鍊師遣此不悉右唐岱嶽觀碑文之一泰山之東南麓王母池有唐岱嶽觀今存茅屋三楹土人稱為老君堂其前有碑二髙八尺許上施石蓋合而束之其字每面作四五層每層文一首或二首皆唐時建醮造像之記周環讀之得顯慶六年一首儀鳳三年一首天授二年一首萬嵗通天二年一首聖厯元年一首久視二年一首長安元年一首四年二首神龍元年一首景龍元年一首三年一首景雲二年二首開元八年一首大厯七年一首建中元年一首其空處又有唐代人題名書法不一東側面有詩一首其下題名西側面題名亦有詩一首中二側面皆無字唐碑存於泰山者唯此及𤣥宗泰山銘蘇頲東封朝覲頌二文皆磨崖刻于山上而此碑在山下以小而雙束故不仆書非名筆故摹拓者少而獨完至今因歎唐時六帝一后修齊建醮凡二十許共此二碑亦異乎近代之每嵗一碑以勞人而災石者矣但不知趙德甫金石録何以不收恐古人碑記失傳者正多耳碑下為積土所壅豫來游數四最後募人發地二尺下而觀之乃得其全文而此敕文辭藻斐然固豫之所亟録而傳者也其記及詩及題名各載其一景龍三年記大唐景龍三年嵗次己酉三月戊午朔十九日景子奉敕令虢州龍興觀主杜太素蒲州丹崖觀監齊吕皓仙京景龍觀大德曹正一等三人于此泰山岱嶽觀建金籙大齊報賽前恩追濟兖等州大德四十九人七日七夜轉經行道設河圖大醮更祈後福以申告請七日之中遂呈四瑞白鶴騰輝拂霞莊而矯色黃雲覆彩映巖穴以通光絲雨飛禎家示九年之蓄烏曦抱戴夀延千載之君紀時日于青郊勒竒工于翠琰夾紵像一鋪十一事二聖本命鎮彩修造右唐岱嶽觀碑文之一唐諱丙改丙為景二聖中宗及韋后也博城縣令詩早春陪敕使麻先生祭嶽守博城縣令馬闕我皇盛文物道化埊先鞭撻走神鬼玉帛禮山川忽下𤣥州使來遊紫洞前青羊得處所白鶴闕時年䖍懇飛龍記昭彰化鳥篇闕風半山水闕氣總雲煙光抱升中霞明五色山橫翠微外室在緑潭邉緹幕灰焚林火欲然光著草樹春色換山泉伊水來何嵩巖去幾千山疑小下􅙷是㑹神仙葉令乘鳬入浮丘駕鶴旋麻姑幾嵗三見海成田右在岱嶽觀碑東側面其文剝蝕不全久視二年記所稱神都青元觀主麻慈力即其人也武后遣之至觀修醮神都即東都故有伊水嵩巖之句又按碑凡大周年者天作地作埊人作􅙷聖作年作月作亦作􅂒日作授作初作唯􅂒字無可考疑是應字凡數字作一二叁肆捌玖等字皆武后所改及自制字其厯年記有云設金籙寶齊河圖大醮漆漆古七字太𤣥經𤣥攡曰運諸漆政𤣥棿曰棿擬之二漆方言曰吳有漆娥之臺是也後人不知妄于左傍添鑿三㸃淺而大又稍偏知非一筆唐碑書七字亦有作漆者後又省筆作㭍冊府元龜載唐𤣥宗先天二年三月癸巳詔制敕表狀書奏箋牒年月等數作一十二十三十四十字是知前此皆王圓題名借一二等字矣不知其始于何年也淄州刺史王圓山人王昌宇大厯十四年二月草七日同登泰嶽時真君道士卜皓然萬嵗道士郭紫微各攜荼藥相候于回馬嶺同闕於王母池登臨之興無所不至右唐岱嶽觀碑題名之一此碑有開元十九年二十年建中元年貞元十四年題名都督兖州諸軍事任要行博城縣丞公孫杲二詩俱不工不録此碑前文從右方起後詩并題名或從右方起或從左方起每層髙下多寡參錯不一以文意筆法求之乃可辨其起訖凡唐人紀遊題名皆就舊碑之隂及兩旁書之前人已題後人即于空處插入大小髙下俱無定凖宋初亦然自大中祥符以後題名者乃别求一石刻書字體始得舒縱亦不與舊又相亂然石小易于搬取故題名愈多而存者愈少今之溝渠碾磨之間皆是物矣此碑西側面又有宋政和甲午題名一條又按荼荈之荼與荼苦之荼本是一字古時未分麻韻荼荈字亦只讀為徒東漢以下乃音宅加反而加字音居何反猶在歌戈韻梁以下始有今音可見唐時字體尚未變爾雅檟苦荼廣韻九麻中有荼字又有茶字注曰俗是也又任要題名曰貞元十四年正月十一日立春祭嶽遂登太平頂宿其年十二月草一日立春再來致祭荼宴于兹曰荼宴者蓋唐時祭畢猶不用酒今不然矣宋董元康題名長清董元康權宰奉髙挈家遊瑶池館觀元功弟題字愴然久之政和四年七月二十一日質贄侍行右小石刻在岱嶽觀豫既録唐碑往還數四道士謂豫曰昨發地得石刻二請觀之其文亦可采同附焉下題因此盛勛題名政和戊戌仲夏二十九日被㫖決獄恭謁祠下飰此轉運判官盛勛公達題男志修侍行右小石刻在岱嶽觀戊戌乃政和八年其年十一月己酉朔改元重和曰決獄者讞而決之古無仲夏斬決之事也宋真宗廣生帝君讃若夫典治喬嶽表正靈祗司生發于東方仿聰明于上帝宜乎名冠仙籍德被蒸民饗祀典于蕭薌鏤徽稱于金石者也屬以䖍修封禮恭答神庥薦顯號以致誠述斯文而頌美讃曰節彼岱宗奠兹東土生育之地靈仙之府爰有髙真允司明命至神不測䖍誠斯應茂實克昭儲祥是繄式奉嘉名用伸精意大中祥符元年十月二十七日御書院奉敕模勒刻石右碑在泰山南麓青帝觀中宋真宗御製廣生帝君讃并序其文及篆額皆御書青帝即禮記月令所謂其帝太皥而史記封禪書秦宣公作密畤於渭南祭青帝者也夫帝者一而已矣易傳曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮是周流于四時八卦之中而其為帝者一也家語載孔子之言曰丘也問諸老聃曰天有五行水火金木土分時化育以成萬物其神謂之五帝古之王者易代而改號取法五行五行更王終始相生亦象其義故其生為明王者死而配五行是以太皥配木炎帝配火黃帝配土少皥配金顓頊配水于是有五天帝五人帝之說漢儒因之遂立感生帝之名謂帝王者先祖皆感太微五帝之精以生鄭康成述春秋緯說蒼帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀則王子雍諸儒所排駮而後世雖存五帝之祀亦不遵用其名者也豈若易傳之言簡而當哉若真宗之事又所不足論云加青帝懿號詔敕中書門下名嶽配天乃衆山之推長盛德在木實品物之資生唯真宰之斯存蓋靈篇之攸紀青帝真君職司煦育道叶冲虛贊𤣥化于髙明庇羣生于溥率真祠夙建方志可徵屬嚴駕以時巡爰祕封之成禮式瞻神館冀篤冥休祗舉典章載揚懿美奉徽名而昭薦旌𤣥德于無方用表欽崇永綏福祉宜尊懿號曰青帝廣生帝君觀宇特加修飾故兹詔示想宜知悉大中祥符元年十月二十五日下御祝文大中祥符元年嵗次戊申十一月戊午朔四日辛酉崇文廣武聖明仁孝皇帝謹遣尚書兵部員外郎邵曄告于青帝廣生帝君伏以峻功不宰誕彰隂隲之仁神化無方實主發生之宇惟髙真之攸館奠喬嶽之靈區屬以祗奉元符躬陳大報仰繄景貺克舉上儀式昭闕之稱以表欽崇之禮合申致告用逹䖍誠謹告右共一碑前刻序讃大字後刻詔祝文字稍小升元觀牒尚書省牒准泰寧軍奉符縣升元觀右第一行泰寧軍狀據兖州儀曹椽兼兵曹婁寅亮狀稱契勘兖州奉符縣泰山之下有古洞天周三十里名曰三宫空洞之天載石圖經是實即目宫觀並無名額却有建封院一所逼連嶽廟之後殿屋完偹田産頗多只一村僧占據住持任從民間安攢丘墓穢惡不蠲深慮觸瀆真仙不便欲乞偹申朝廷改為道觀州司看詳本院委合改充前件洞天道觀伏候指揮右小字牒奉敕宜賜升元觀為額牒至准敕故牒右大字草書起復太中大夫守左丞王特進少宰起復少保太宰太師魯國公不押右字略小真書政和八年六月十四日牒右末一行政和八年閏九月二十一日襲慶府管內都道正兼權措置知升元觀事洞元大師賜紫道士李沖寂立石右左方之下右碑在泰山東南麓升元觀其大字草書甚遒徑不知何人筆録之以見當日牒文之式考宋史婁寅亮傳但云政和二年進士為上虞丞不言厯官兖州亦可以此碑補史之闕其曰太師魯國公則蔡京也普照寺有金大定五年牒碑長春觀有元丁亥年牒碑其式略同金元碑並有印曰尚書禮部之印即今通行大篆文不用女直蒙古字後唐冥福院牒中書門下宣賜冥福禪院産業地土右第一行第二行起開載地土數目不俱録右付冥福禪院准此此一行在數目之後長興四年九月二十三日牒中書門下之印在二十三字上樞密使檢校太傅平章事駙馬都尉趙前印樞密使檢校太傅平章事范前印樞密使檢校太傅平章事范前印又加一印在使字上中書門下牒冥福禪院右碑在今泰安州城內冥福寺此牒無押而每人各用一印兩樞密使趙延夀范延光並見五代史又今官府文移准字本當作凖相傳以為宋寇萊公作相日避其名改之今據後唐時牒己用准字則知此字自取省筆之便不始萊公也廣韻二字並收准字下注曰俗然莊子平中准管子懷繩與准鉤准繩文子放准循繩皆用此字碑下層有僞齊阜昌二年二月初二日給戶案不録宋范致君題名武夷范致君久慕仙風自楚之魯遂登泰山以望八極之表有宋大觀元年正月草三日記于是碑右小石刻在泰山南麓后土廟錢伯言題宣和己亥九月草四日面奉玉音至奉符催視嶽祠後一月伯言至自兖明日具香燭以告上㫖而罷醮于㑹真宫獨登瑞雲亭早飯于行館遂同令寇庠丞吕光問祠官曹欽承萊蕪令韓僖道士蘇彥弼謁岱嶽觀留連池上復自金母洞過青帝觀觀文僖丞相遺刻遂遊白龍潭奠御苑玉芽于水中愛其泉石之勝乃相與䇿杖散步還過雞籠峰始復有輿躬走社首山視禪壇訪遺跡晚入乾元觀小飲翠隂亭而歸知襲慶軍府事錢伯言題右碑舊在宋天書觀後人移之州城內嶽廟中西墀古松下行書大徑寸餘唐景龍觀鐘銘原夫一氣凝真含紫虛而構極三清藴祕控碧落而崇因雖大道無為濟物歸于善貸而妙門有教滅咎在于希聲景龍觀者中宗孝和皇帝之所造也曽城寫質閬苑圖形但名在騫林而韻停鐘簴朕翹情八素締想九𤣥命彼鼓延鑄斯無射考虞倕之懿法得晉曠之宏規廣召鯨工逺徴鳬匠耶溪集寶麗壑收珍警風雨之晨節昏明之候飛廉扇炭屏翳營爐翥鶴呈姿蹲熋法狀角而不震侈而克揚庶其曉散靈音鎮入鵷鸞之殿夕騰仙韻恆流鳷鵲之闈聾俗聽而咸痊迷方聞而永悟洪鈞式啓寶字攸鐫其銘曰紫宸御厯青元樹因傾巖集寶竭府收珍杜夔律應張永規陳形包九乳儀超萬鈞上資七廟傍延兆人風嚴韻急霜重音新自兹千嵗從今億春懸玉京而薦福侣銅史而司辰景雲二年太嵗辛亥金九月癸酉金朔一十五日丁亥土鑄成白龍池宋人題名內供奉官李舜舉被命禱祀帝嶽奉香勝槩于夀聖節日先欵青帝宫次詢白龍潭治平四年題下云書吏李恭從行蓋此字即恭之筆兖守劉兖奉詔祈雪于岱宗登絶頂翌日謁白龍池之祠元祐丁卯孟春初四日奉符令林㑹題大字貫道建欄于此以便逰者元祐丁卯正月八日大字范陽正輔再遊同魯國景元符丁丑三月草六日元符庚辰七月晦趙習之徐安國弟居仁孫正仲同遊大字皇甫稱徐端朝孫幯同遊建中靖國元年三闕日題奉符令李圭因捕蝗恭謁白龍祠男彚侍行崇寧壬午孟春初七日誠中君實德升崇寧二年八月草六日自王母池來訪此董元康政和甲午重九日攜家來遊執贄賁侍行自恭觀元康兄留字正和乙未孟春二十日莆陽陳國瑞子玉恭謁白龍池祠俯洞酌泉小憩而邁政和丁酉夏前二日大字姜子正子方李晉道劉言可刁文叔同來庚子四月李顯道張公美王仲與張去塵庚子孟夏十九日遊池上鄄城李僓弟倰姪贛隨侍遊此癸卯孟春草八日張子觀水于池十三年春三月篆書大字無年號按宋朝紀無有至十三年者若曰金元又不合一代全無題名止此一人也右在嶽西傲來峰下白龍池壁上平廣計二十餘丈書曰龍潭曰白龍池並大字其旁皆宋人題名尚未刓缺録之得十五首其文略無重復自治平迄宣和六十年間人名字亦可以想見當日太平之盛而金元以降洊遭兵火名山奧區委之榛莽無復有題名者矣張子觀水于池篆書張字作弡按劉原父弡仲􅔆銘釋弡為張以為張仲之器歐陽永叔從之趙明誠金石録疑之黃長睿東觀餘論則云弡其勿反非張字考之玉篇信然此云弡子則為張子無疑蓋宋人之好竒者據原父永叔所定之字而用之耳靈巖寺宋李迪詩大丞相文定公游靈巖詩靈巖山勢異金地景難窮塔影遮層漢鐘聲落半空千峰羅雉堞山如城壁之狀萬仞聳屏風飛鶴來清竇有雙鶴泉刳魚掛古桐名曾參四絶封合亞三公勢徹河堧逺行差嶽鎮雄仙閭鄰峻極月觀伴穹崇邃洞連蓬島重巒鑿梵宫山面有證明功德嵌望應銷俗慮登喜出塵籠獻夀嵩衡並分茅岱嶽同艮方標出震午位對升中嵐滴晴煙碧崖鋪夕照紅巍峩齊太華竒勝敵崆峒鍊句供詩客模真怯畫工天孫分怪狀神化結全功吟賞慵回首林泉興愈隆先丞相天聖間嘗留詩寺壁後主僧刻石逮今嵗久字畫刓缺因命工再刋石紹聖五年三月中浣日姪曾孫新滑州白馬縣主簿李侃敬書右小石刻在濟南府長清縣靈巖山寺中其山距府九十里南接泰山北帶龍洞齊乘以為疑即水經之玉符山而魏書所云朗公谷者在其東南自前代稱為勝境宋金元題字最多豫至則當兵火之後縱橫偃踣委之荆棘瓦礫之中然猶得唐一金得四十餘元以後不能悉數唐刻為天寶十一載造舍利函記文不工不足録而宋刻年月序次以此首按史李迪諡文定前後三知兖州其再任乃仁宗天聖中也滕涉詩天聖戊辰嵗七月奉詔解青印社歸闕粵十四日道出魯經靈巖之山靈巖古地也山經地志頗載竒勝因飭駕遊于是於時金火交勝天宇如灼周覽未卒頓獲清凉蓋古之君子登名山覽絶景思有以不忘者矧今相國隴西公復題名于壁余因命筆以繼君子之行兼記嵗月而已行右諫議大夫前知青州軍州事滕涉山半舊招提捫蘿躡石梯佳名表四絶勝境出三齊殿古煙霞窟庭深桂柏蹊嶽靈分地界雲險接天霓香篆清風裊松廊翠巘低飛塵無路入幽鳥隔巖啼夢破泉聲急飄凉竹韻凄微陽生頂上殘月落峰西暫到猶塵慮長居信覺迷致君功業就向此卜幽棲祖無擇詩寺有四絶一曰靈巖余以赴官獲兹稅鞅因賦拙句用志其行新通守濟南祖無擇嘗想靈蹤得道難因回征轡此盤桓松風逗磬僧齊冷石水環堂客夢寒聖作儼同堯典布寺有偃蓋松白寉泉及大宋皇帝御製御書古碑猶是魏朝刋最憐山色當樓好欲去重來一憑欄景祐五年十月草三日范知章題名髙平范知章希聖公量餞弟敏求赴官相臺太原王廣淵同來題治平四年十月二十日寺主賜紫廣化大師記孔舜思詩題靈巖寺尚書職方郎中通判齊州孔舜思忽從平地出塵籠親到諸天釋梵宫却悟冗官長役物爭如大士日談空山橫青壁千層合泉迸丹崖一線通幽鳥靜啼人外境疏鐘不墮世間風目無可欲猿猱伏心絶微塵冰鑑融自恨無緣陪宴坐它生願效種松翁熙寧九年丙辰十月闕日住持𫝊法賜紫沙門吕立石張㑹宗詩留題贈靈巖鑒公禪師守祕書丞分司南京張㑹宗人中令德居髙地天下精藍占好山四絶名標清世上十方僧聚白雲間二龍珠照看經靜寺僧謂余曰此寺嘗有識者曰二龍玩珠勢也雙鶴泉供洗鉢閒早晚利榮韁鎖脫性通三教扣禪關丁巳三月二十七日鮮于侁詩留題靈巖寺七言一首兼簡載師長老鮮于侁馬煩箠䇿車馳轂終嵗塵勞常碌碌喜聞巖寺並山中路轉清溪入幽谷乍行山口疑洞天窮深一上翻平田千層臺殿隱林木四面石壁生雲烟山僧迎門笑相揖為語祖師存往迹屈指于今八百年已在西來逹摩前鶴鳴飛止黃金地錫杖湧起清凉泉境稱四絶名天下天台石橋乃其亞千峰不改嵗時寒一水最憐秋月夜半生遊學頗艱辛且向空山老此身也知方丈安禪處解笑東西南北人元豐二年正月五日住持傳法賜紫守載立石寃亭卞詩留題靈巖古詩十韻寃亭卞卞字下缺石一角屈指數四絶四絶中最優此景冠天下不獨竒東州夜月透巖白亂雲和雨收甘泉㵼山腹聖日穿崖頭大暑不知夏爽氣常如秋風髙松子落天外鐘聲浮祖師生朗石古殿名般舟人巧不可至天意何所留老僧笑相語此事常窮求移出蓬萊島待吾仙子遊元祐庚午三月二十八日東武王璞書蔡安持詩四絶之中處最先山圍宫殿鎖雲烟當年鶴馭歸何處世上猶傳錫杖泉元祐壬申十月中浣睢陽蔡安持資中題杜欽況詩靈巖行杜欽況山回路疑絶林深祕巖扃鑿翠出金碧開軒列雲屏希有昔成道久矣斯巖靈法定卧蒼壁白日穿空明金威指泉竇一鑒秋寒澄定水供言衆不縮亦不盈如公禪宗秀于世本無營聊為出山雲乘風任縱橫坐令多寶藏百神轉雷霆夜月嘯雕虎玉匣開晶熒笑指八解池外流中不傾何必空山雷始悟物我情宣和六年三月草七日書王淵題名方渠王淵幾道緣職事訪如師和尚遍觀靈巖勝迹當日回厯下宣和己巳六月十二日書金王珩詩巡按詣靈巖名利禮佛焚香憩坐于超然亭覽堂頭琛公佳製謾繼嚴韻山東路提刑王珩鐘山英秀草堂靈林下相逢話愈清聞道謀身宜勇退得閒何必待功成明昌五年十月十五日上方靈巖禪寺住持傳法沙門廣身立石路伯達詩琛公堂頭和尚有題超然亭頌因次其韻冀州節使路伯達六合空明現此亭本來無垢物華清客來便與團欒坐萬偈何妨信手成明昌五年十二月十五日上方靈巖禪寺住持沙門廣琛立石元傅亭詩至正乙未秋九月因公赴山東遊靈巖禪寺秋晚登臨上岱宗扶笻來此謁崆峒閒雲送雨過深洞老鶴將雛度逺空白石清泉心未了黃花紅葉思無窮攜書歸隱知何日坐想遊山入夢中靈巖山房尋同年長清縣尹張君德昭不遇慈恩塔上題名後京國分攜十四年夢想故人詩句裏坐看黃菊酒杯邉停雲靄靄秋容淡落葉蕭蕭客恨偏獨倚禪房重搔首又鞭歸騎過前川丙申春三月海嶽降御香回重游靈巖次題明叔詩韻石徑穿雲雨意涼乘軺重過老僧房門前古柏凝新翠巖畔幽深散異香鶴舞雙泉春水緑龍歸深洞暮山蒼禪僧久已無拘礙笑我狂遊去逺方前進士應奉翰林文字承事郎同知制誥兼國史院編修官傅亭題時弟益男文炳侍行云右石刻大小不一凡十三通俱在靈巖寺其它刻宋時者則有田稹五言詩嘉祐五年王逵千佛殿記元豐庚申李公顔金像記元祐壬申卞育遊山記大觀戊子郭思遊山記大觀三年住持仁欽篆書心經大觀四年仁欽生老病死苦頌仁欽十二時歌仁欽靈巖十二景詩政和元年净熙和尚誡文政和五年劄付政和乙未趙子明題名靖康元年髙直臣題名而蔡卞經碑四幅前元符二年十二月十三日書後建中靖國元年十一月五日書在御書樓下特為書家所珍又有面壁像碑宋建中靖國元年陳師道記金皇統七年重立金時者則有皇統七年雲公禪師像正隆丙子張汝為題名大定戊戌蕭守中題名明昌六年本寺田園記明昌七年党懷英靈巖寺記元時者則有蛇兒年大元國師法㫖碑蒙古字至元龍兒年帝師法㫖碑蒙古字大德六年天童覺和尚默照銘至正四年察罕布哈碑書唵嘛呢巴彌吽一行漢字一行蒙古字凡元碑最多不盡録録其稍異者有至治元年呼都克郡王太夫人巴約特氏詩詩只二句曰巖前松檜時時緑殿上君王嵗嵗春大字刻之亦不類婦人筆也又有宋蘇子由五言驗為後人補刻而復有子瞻徐州一歌誤刻于此其詩各見集中不録後之君子知豫之所取者非以助二氏之狂瀾拾前朝之落艷而情深好古意在闡幽自有不能巳者且因以覽世道之汚隆考文辭之醇雜亦豈不為學人之一助哉唐岱嶽觀雙碑西一碑北面第一層顯慶六年二月草三日敕賜東嶽先生郭行真弟子陳蘭茂杜知古馬知止奉為皇帝皇后七日行道並造素像一軀二真人夾侍大周萬嵗通二嵗次丁酉東明觀三洞道士孫文俊奉册金輪神皇帝肆伍敕將侍者姚欽元詣此嶽觀祈請行道事畢敬造石尊像一軀並二真人夾侍庶兹景福永奉躬聊記其用傳不朽專檢校博城縣主簿關彥博録事張則上第二層久視二太嵗辛丑􅀢􅂒乙亥朔二丙子神都青元觀主麻慈力親承㫖內賫龍璧御詞繒帛及香等物詣此觀中齊醮功畢伏願我皇萬福寶業恆隆敬敕闕齡冀同礪而無朽侍者道士麻宏倩祗承官朝散郎行兖州都督府參軍事攝功曺房希聖祗承官登仕郎行兖州都督府録事劉懷彥儀鳳三年三月三日大洞三景法師葉法善等奉敕于此東嶽修齊設河圖大醮所有鎮綵等物敬造壁畫元始天尊萬福天尊像兩鋪功德即畢勒石紀年此條在左方按儀鳳是髙宗年號反在武后之後不可解第三層大周長安四嵗次甲辰十一􅂒癸未朔十五丁酉闕觀威儀師邢虛應法師阮孝波承儀郎行宫闕承劉懷闕都闕奉敕于東嶽觀岱嶽觀中建金籙大齊草九日行道設醮奏章投龍薦璧以本命鎮綵物奉為皇帝敬造石天尊皇上天尊一鋪十事闕壁畫天尊一鋪十三事敬寫本際經一部度人經十卷欲兹功德奉福躬其􅂒四前行道之時忽見彩揚光加以抱戴俄頃之際雲色稍殊遂有紫霞間起黃雲聿興遍覆靈場並成輿蓋覩斯嘉瑞敢不書之齊醮既終勒文于石岱嶽觀主倫虛白專當官宣德郎行兖州都督府參軍事王處廉專當官文林郎守博城縣主簿韓仁忠專當官嶽丞劉闕第四層大厯八年建醮并造碑樓題名剝蝕不全西碑南面第一層大周厯元年嵗次戊戌臘癸巳朔二甲午大𢎞道觀主桓道彥弟子朝自揣奉敕于此東嶽設金籙寶齊河圖大醮漆行道兩度投龍遂感慶雲三見用齊醮物奉為天冊金輪神皇帝敬造等身老君像一軀並二真人夾侍兖州團練使都虞候銀青光祿大夫試衛尉卿上柱國髙晃兖州團練使押牙忠武將軍守左武衛大將軍上柱國趙俊專當官博城縣尉李嘉應此三人官銜書作五行從左方起第二層大周長安肆嵗次甲辰玖􅂒甲申朔捌辛卯敕使內供奉襄州神武縣雲表觀主𤣥都大洞叁景弟子中嶽先生周元度并將弟子二􅙷金州西城縣𤣥宫觀道士梁悟元奉叁二拾玖敕令自於名山大川投龍璧修無上髙元金𤣥玉清九轉金房度命齊叁叁夜行道陳設醮禮用能埊清和風雲靜默神靈效祉表夀之無窮者也專當官朝散郎行參軍燉煌張俊并書專當官文林郎守博城縣主簿韓仁忠專當官宣德郎行闕劉𤣥機第三層大唐景雲二年嵗次辛亥八月癸卯朔十四日景辰蒲州丹崖觀上坐吕皓仙奉今年閏六月十九日敕往東嶽及萊州東海投龍并道次靈跡修功德將弟子二人蒲靈仙觀道士杜含光丹霞觀道士王元慶道士孫藏暉于此三日三夜􅕊九人金籙行道設齊醮并投龍朝議郎行倉曹參軍陸大鶼朝議郎行兵曹參軍髙岋通直郎行參軍袁幹特宣義郎行瑕丘縣丞裴遇等奉都督齊國公崔處分令此起居吕尊師時屬仲秋謹題斯記第四層大唐大厯七年太嵗壬子正月癸未朔草三日乙巳奉敕于岱嶽觀修金籙齊醮及于瑶池投告事畢故題記修功德中使內侍魏成信判官文林郎守內府丞劉元載判官掖庭局丞楊彥瓌小使掖庭局丞魏貴珍使內供奉道士申升𤣥使翰林供奉道士王瑞靜山人王昌宇弟子道士李日榮駱真運大叔法澄行官陳顒同勾當官朝議郎行乾封縣尉郭璆專知齊醮檢校官朝議郎行兖州府參軍王楚李志晟張守圭行官郭元光劉仙第五層題名不全東一碑北靣第一層大周二嵗次辛卯二癸卯朔十壬子金臺觀主中嶽先生馬元貞將弟子楊景初郭希元內品官楊君尚歐陽智琮奉神皇帝敕緣大周革命令元貞往五嶽四瀆投龍作功德元貞于此東嶽行道章醮投龍作功德一十二夜又奉敕敬造石元始尊像並二真人夾侍永此岱嶽觀中供養祗承官宣德郎行兖州都督府倉曹參軍事李叔度第二層長安元嵗次辛丑十二􅂒己亥朔草三辛酉道士金臺觀主趙敬同侍者道士劉守貞王懷亮等奉十一􅂒七敕於此泰山岱嶽觀靈壇修金籙寶齊三三夜又於觀側靈場之所設五嶽一百草槃醮禮金龍玉璧並投山訖又闕鎮綵紋繒敬造東方玉寶皇上天尊一鋪並二真人仙童仙女夾侍闕供養其祥風暫息瑞雲便停香燭氤氲􅂒明朗神靈祉吉祥事畢故刻石記時勒名題專當官宣義郎行博城縣丞公孫闕專當齊并檢校像官博城縣主簿登仕郎董仁智都檢校官承議郎兖州大都督府户曹參軍王果第三層大唐神龍元年嵗次乙巳三月庚辰朔草八曰丁未大𢎞道觀法師阮孝波道士劉思禮品官楊嘉福李立本等奉敕于岱嶽觀建金籙寶齊􅕊九人九日九夜行道并設醮投龍功德既畢以本命鎮綵等物奉為皇帝皇后敬造石𤣥真萬福天尊像一鋪檢校尚書駕部郎中使持節都督兖州諸軍事兼兖州刺史侍御史元本州團練使任要貞元十四年正月十一日立春登嶽遂登太平頂宿其年十二月草一日立春再來致祭荼宴于兹同遊詩客京兆韋洪押衙王遷運乾封縣令王怦尉邵程嶽令元置造車十將程日升後到續題給事郎試太子中允劉秀良書此因神龍記後石有空處遂附題焉中唐以至宋初大率如此其書從左方起第四層大唐景龍二年嵗在戊申二月甲子朔十二日乙亥大龍興觀闕敕往東嶽陳章醮薦龍璧以其月草七日辛卯於泰嶽觀并上闕設金籙行道九日九夜燒香然燈并設五嶽名山河圖等醮闕功德事畢奉用本命紋繒及餘鎮綵敬造鎮國天尊一鋪一十六事闕皇猷永固與靈嶽而恆安國祚長隆等𤣥都而自久朝議郎行兖州闕軍事王翰朝散郎行兖州都督府參軍事上柱國兼直安樂公主府闕乾封縣令上柱國張懷貞儒林郎行乾封縣主簿闕騎都尉韓仁忠等恭承睿旨沐浴身心䖍拜靈壇勤亦至矣稽首無上而為讃曰泰山巖巖兮凌紫氛中有羣仙兮乘白雲陳金薦璧兮闕臘月中與韋户曹遊發生洞徘徊之際見雙白蝙蝠三飛洞門時多異之同為口號任要山翠幕靈洞洞深𤣥想微一雙白蝙蝠三度向明飛雖然有兩翅了自無毛衣若非飽石髓那得凌闕偶見歸堪說殊勝不見歸同前韋洪欲驗發生洞先開冰雪行窺臨見二翼色素飛無聲狀類白蝙蝠幽感騰化精應知五馬來啓蟄迎春榮露冕闕之久鳴騶還慰情此亦附題從左方起東碑南面第一層大唐景龍三年嵗次己酉三月戊午朔十九日景子奉敕令虢州隆興觀主杜太素蒲州丹霞觀監齊吕皓仙京景龍觀大德曹正一等三人于此泰山岱嶽觀建金籙大齊報賽前恩追濟兖等州大德􅕊九人七日七夜轉經行道設河圖大醮更祈後福以申告請七日之中遂呈四瑞白鶴騰輝拂霞莊而矯色黃雲覆彩映巖穴以通光絲雨飛禎家示九年之蓄烏曦抱戴夀延千載之君記時日于青郊勒竒工于翠琰夾佇像一鋪十事二聖本命鎮彩修造户曹盧近觀縣令張懷貞主簿韓仁忠第二層景雲二年敕已見前開元十九年十一月都大𢎞觀道主張遊霧京景龍觀大德楊琬建立真君于此修齊三日三夜專當官朝散郎曲阜主簿上官賔登仕郎乾封縣尉王去非瑕丘尉攝此縣盧昊第三層嵗六月我皇有意于神仙敕使正議大夫內給事梁思陀寺伯俱𤣥明等與道士任無名于東嶽泰山投龍合練寵以紫綍送以紺錢皇皇焉濟濟焉乘傳而來矣都督韋君仰祗帝命逺挹使車爰擇幹明式經構葺朝議郎行功曹蓋寡疑宣德郎行參軍李烈恭行郡命届兹岱嶺因太山之木用近土之人鑿碧巖壘丹竈列星柱亘虹梁匠無宿舂農不下壟嘗未浹日厥功已成棟宇以來莫籌其速乾封主簿趙眘持劇務以應諾總羣事而趨走恪勤匪懈不遑自寧息徒庀工刻詞貞石于時開元八年嵗次庚申七月壬子朔草日辛未畢此功也瑕邱尉攝此縣盧昊第四層開元草年二月八日敕使內侍省謁者監胡寂判官掖庭局監作寧君愛上騎都尉王元德專知官登仕郎行乾封縣尉王去非驅使官樂瓌題記以上從左方起淄州刺史王圓山人王昌宇大歷十四年二月草七日同登泰嶽時真君道士卜皓然萬嵗道士郭紫微各攜荼藥相候于回馬嶺同憩于王母池登臨之興無所不至已上從右方起第五層平盧淄青支度判官中大夫檢校尚書工部郎中兼侍御史敬謇節度押牙中大夫試殿中監馮珣山人吕滔文林郎守兖州府嶽曹參軍田浩文林郎任城縣尉髙鍠朝散大夫行任城縣令權知乾符縣令楊序節度驅使官朝散郎試光祿寺主簿明幹唐建中元年二月草九日同闕嶽因訪瑶池故志之東側面早春陪敕使麻先生祭嶽詩已見前西側面五言贈諸法師宣承郎行博城縣丞公孫杲駕鶴排朱霧乘鸞入紫烟凌晨味潭菊薄暮玩峯蓮玉葉低梁下金飀引窗前嘯傲雲霞際留情鱗羽年西側面各有題名猥雜不録西側面上有一題名云長清董元康權宰奉髙受代將歸同王彥文遊政和甲午重九日崇道繼至惟此一條是宋人書唐李敻詩恆嶽晨望有懷定州司馬李敻二儀均四序五嶽分九州靈造良難測神功匪易酬恆山北臨岱秀崿東跨幽澒洞鎮河朔嵳峩冠嵩丘禋祠彰舊典壇廟列平疇古樹侵雲密飛泉界道流從官叨佐理銜命奉珍饈薦玉申誠效鏘金諒有由郊原照初日林薄委徂秋塞近風聲厲川長霧氣收他鄉饒感激歸望切祈求景福如光願私門當復侯右詩在真定府曲陽縣北嶽廟中廟有唐時大碑五其一韋虛心文陳懷志書行草其一張嘉貞文自書其一鄭子春文崔鐶八分書其一李荃文戴千齡八分書其一劉端文王知新書行草碑隂及兩旁刻字皆滿其上層為積土所蓋而余至時倉卒求梯不可得止就下方讀之大率皆真元至天祐十數朝祭嶽題名亦有宋人刻字獨此詩在韋碑後文雖不工然子見近代君子搜剔唐人之詩至于無名氏不知何代人之作皆收而附之而此灼然不誤者乃不得與斷簡殘編之列又北嶽廟自大碑之外絶無題詠故特録焉又有宋王禹稱陳彭年韓琦三大碑及白憲書石幢一字皆可觀而稚圭自書逼真顔魯公世人傳其字者罕也李克用題名河東節度使檢校太保同中書門下平章事隴西郡王李克用以幽鎮侵擾中山領蕃漢步騎五十萬衆親來救援與易定司空同申祈禱翌日過常山問罪時中和五年二月草一日克用記易定節度使檢校司空王處存看題至三月十七日以幽州請就和斷遂却班師再謁睟容兼申賽謝便取飛狐路却歸河東克用重記下小字云天㑹十二年七月六日尚書都官員外郎知曲陽縣事髙君陳模刋右石刻在北嶽廟中大字甚佳克用沙陀之子不聞工於筆法宣和書譜謂朱梁太祖批答賀表當是筆史所書此亦其類與宋沈括筆談云嶽祠在曲陽祠中多唐人故碑殿前一亭中有李克用題名則知此字當時所刻或毁于靖康之兵火而金天㑹十二年重刻之金石也又存中言北嶽常山今謂之大茂山是也半屬契丹以大茂山分脊為界嶽祠舊在山下石晉之後稍遷近裏今其地謂之神棚却恐未然按碑宋初祠為契丹所焚淳化二年魯遷而唐朝巨碑皆在其中亦非徙至者也王貞遊三關記云廟貌著于唐不自宋始可信宋蘇軾題名蘇軾禱雨嶽祠同李之儀李士龍郭長卿孫敏行闕賈溫之右小石刻舊在嶽廟今移縣治賔館又有子瞻書詞歸去來兮一闋清夜無塵一闋九十日春一闋用石二片兩面書之舊在縣西北二里水竇巖今移嶽廟皆大字其詞見蘇文忠公集中吳越武肅王墻隍廟記重修墻隍神廟兼奏進封崇福侯記若夫冥陽共理之規人神相贊之道傳于史冊今昔同符切以浙東地號奧區古之越國當舟車輻湊之㑹是江潮衝要之津自隋末移築子墻因遷公署據卧龍之髙阜雉堞穹崇對鏡水之清波風煙爽朗緬惟深固宜叶冥扶故唐右衛將軍總管龎公諱玉頃握圭符首臨戎政披榛建府吐哺綏民仁施則冬日均和威肅則秋霜布令屬牆愛戴黔庶歌謡尋而罷市興嗟餘芳不泯衆情追仰共立嚴祠鎮百雉之岡巒宰軍民之禍福殿堂隆邃儀衛精嚴式修如在之儀仰託儲靈之䕃往載釁生劉氏妖起羅平豫躬禀睿謀恭行天討數年擐甲兩復越墻皆資肸蠁之功以就戡平之業特為重增儀像嚴潔牲牢邇來四野無塵重門罷柝丁卯嵗揚旌東渡巡撫軍民躬奠椒漿日瞻靈像每暢吳風越俗共歌道泰人安昔為兩鎮之疆今作一家之慶遂馳箋表請降崇封所冀朝恩與西使始牧齊標疑有誤美稱共秦巒對聳尋蒙天澤果賜允俞頒崇福之嘉名升五等之尊爵其所奉敕命具列如左右小字敕鎮東軍墻隍神龎玉前朝名將劇郡良材傾當作頃因剖竹之辰實有披榛之績創修府署綏緝當作輯吏民豈獨遺愛在人抑亦垂名終古况錢鏐任隆三鎮功顯十臣能求福而不回致效靈而必應願加懿號以表冥符宜旌岌嶪之功用顯優隆之澤宜賜號崇福侯仍付所司牒至准敕者右大字噫乎人惟神祐神實人依爰自始建金湯肅陳祠宇奠兹中壘三百年來雖享非馨未登列爵今則值子佐國連統藩維啓吳越之雙封為東南之盟主况遇金行符籙梁德克昌道既泰于君臣澤遂加于幽顯獲申奏薦遽降徽章今則象軸煥新龍綸逺至表勳名于萬代昭靈感于千秋固當永荷皇私長垂幽贊保我藩宣之地遐清災沴之源共泰斯民永安吾土烜矣赫矣永作輝華今當吳越雙封一王理事亦仗土地隂隲冥力護持神既助今日之光榮豫亦報幽靈之煥耀但慮炎凉改易星嵗徂遷不記修崇莫源事始聊刋貞石以示後來時大梁開平二年嵗在武辰闕月闕啓聖匡運同德功臣淮南鎮海鎮東等軍節度使檢校太師守侍中兼中書令吳越王鏐記右碑在紹興府卧龍山西岡上城隍廟中此碑以城為墻以戊為武問之越人皆茫然莫對錢塘吳任臣博物君子也一日豫舉此碑詰之答曰五代史梁本紀注曰梁嘗更戊曰武朱溫父名成戊字類成故改之城之改墻亦此故也然本紀言溫父名誠非成亦豈歐陽公誤耶豫按舊唐書哀帝紀天祐二年七月敕全忠請鑄河中晉絳諸縣印縣名內有城字並落下如密鄭絳蒲例單名為文九月敕武成王廟宜改為武明王十月敕改成德軍曰武順管內藁城縣曰槀平信都曰堯都欒城曰欒氏阜城曰漢阜臨城曰房子避全忠祖父名也十一月敕改路州路城縣曰潞子黎城曰黎亭又敕改河南告城縣曰陽邑蔡州襄城縣曰苞孚同州韓城縣曰緯元絳州翼城縣曰澮川鄆州郢城縣曰萬安慈州文城縣曰屈邑澤州晉城縣曰髙都陽城縣曰濩澤安州應城縣曰應陽洪州豐城縣曰吳髙又按五代史成德軍梁初以成音犯廟諱改曰武順其曰音則以二字同音而避之禮所謂嫌名者非誤也又曽子固因跋韓公井記云城改為墻者梁太祖父烈祖名誠當時避之此更可據然因成而改戊甚為迂曲周公謹齊東野語亦云此全無義理又戊本音茂不知何以有武音而鄭樵謂十辰十二日皆為假借甲本戈甲乙本魚腸丙本魚尾丁本蠆尾戊本武已本凡又不知其說何所本也又按城隍二字始見于易爻城復于隍之文說文隍城地也有水曰池無水曰隍而非以為神也禮曰諸侯祭五祀而國門居其一鄭氏以國門為城門則始有祭城之說而非以為一國之主也洪武二年禮官奏城隍之祀莫詳其始唐李陽冰縉雲城隍記謂祀典無之惟吳越有之然成都城隍祠太和中李德裕所建而張說有祭城隍文韓愈有祭潮州袁州城隍文杜牧有祭黃州城隍文則不獨吳越也蕪湖城隍建于吳赤烏二年北齊慕容儼梁武陵王祀城隍神皆書于史則又不始于唐也豫考其所云赤烏年者固不足慿而大約起于南北朝之世至唐末而無地不祀無州不祭又必指一人以當之如吳之春申君永嘉之周苛南昌之灌嬰潤州之紀信而此郡則以為前總管之龎玉地祗人鬼合為一身祀典之不經至斯而極已或曰如子之言則令甲所封為神者非與非人鬼也而可以察人間之善惡與曰奚不可哉在古有之國社里社庶人所得而祭也啓之戰甘曰不用命戮于社而王莽之誓其下曰有不為新室者社鬼記之是固以土神而司生殺之柄者也今之城隍古之社也名異而實同國家之所奉神則馮焉不必其託于人鬼而後能靈爽也豫既録此碑封號而慮為後人之諂鬼者助之左證也故并論之宋敕碑敕賜昭祐公碑碑額篆文尚書省牒越州顯寧廟昭祐公大字太常寺狀准尚書省劄子三省同奉聖㫖駐蹕㑹稽今已逾嵗妖祲不作行殿載寧越州城隍廟崇福侯可特賜敕額封公並令太常寺擬定申尚書省依准今降聖㫖指揮欲擬昭祐公伏乞朝廷詳酌指揮施行申聞事城隍廟崇福侯右小字牒奉敕朕展義東南駐蹕都㑹宫室城郭之必葺殆嵗之周氛祲妖孽之弗興繄神之祐是用錫上公之尊爵加二字之榮名不顯其光庸示無窮之報自今伊始常儲有羡之祥宜特封昭祐公牒至准敕故牒右大字紹興元年五月闕牒牒字上有尚書省印參知政事張沽官銜俱在中半截寫起尚書右僕射尚書門下省字少傅鎮潼軍節度使判紹興軍府事兼提舉學事兼管內勸農使充兩浙東路安撫使馬步軍都總管信安郡王食邑七千二百尸食實封三千四百户孟忠厚立石右碑在城隍廟中其隂大書曰賜顯寧廟額敕按宋史建炎四年四月癸未帝駐蹕越州五月癸丑以張守參知政事與碑合晉祠宋人題名熙寧戊申嵗秋九月十四日范陽盧大雅君美臨川王安禮和甫清源王夲安國同謁晉祠舍均福堂明日如白雲石甕宿明仙又明日遊甘泉開化而歸夲題夲字從木從十太原王安修世長廣平程易先之安陽蔣畋渭公熙寧癸丑孟夏同遊龍圖閣學士河東經略安撫使曾布提㸃刑獄朝奉大夫范子諒躬率􅒼吏禱雨祠下通判太原軍府事田盛髙復簽書河東節度判官盧訥知陽曲縣馮忱之走馬承受王演檢法官史辨從行元祐丙寅嵗七月十三日訥謹題刋者任貺開封苗仲淵師顔自湖南提刑移本路政和五年十月晦祗見祠下男丕侍宋王安禮題名臨川王安禮赴官太原過謁祠下因與錢塘楊世昌河南張仲咨㑹于泉亭熙寧戊申三月十四日題右題名在太原縣晉祠御書碑隂其碑為晉祠之銘并序唐貞觀二十一年太宗御製并書其文世多有不録獨碑隂字體不一其上右方云司徒太子太師上柱國趙國公臣無忌太子太保上柱國宋國公臣瑀特進太子詹事兼左衛率上柱國英國公臣績光祿大夫刑部尚書上柱國鄖國公臣張亮禮部尚書上柱國江夏郡王臣道宗太常卿駙馬都尉上柱國安德郡公臣楊師道正議大夫守中書令太子左庶子兼攝吏部尚書護軍臣馬周凡七行則當日題者今世流傳摹拓本無此不為完碑其餘則皆宋人續題錯亂無次其空處又有洪武二年行省參知政事楊憲題而絶無唐人題者以御書之碑不敢擅刻故也今所録者四條吕惠卿詩留題興安王廟資政殿大學士河東路經略安撫使吕惠卿翦葉疏封意歸禾協濟心遺風因唐逺積德本周深逝水悲興廢浮雲閲古今祠宫尚翬翼鳴玉漱松隂右小石刻在晉祠祠距府西南四十里懸甕山之麓晉水之所發源後人于此引池結亭架橋其上杯水翳然足為一方之勝其廟負山而東面者晉水之神南面者唐叔之神後晉天福中封唐叔為興安王而宋時又封晉水為顯靈昭濟聖母飾為婦人之像今之人但言聖母而不復知有唐叔為古先有土之君矣故特録此詩亦以此祠自唐御書之外别無文字故也祠前蓮花臺上有鐵人四一紹聖四年一五年造俱完一𢎞治十一年一無年月俱壞因知今人制作不逮古人類如此豈獨文章也哉惠明寺碑隂題名普慈王植安陽王孝彥西河文大方臨川王安禮祀神歸憩此辛亥三月十四日太原縣北門外惠明寺塔碑宋元豐八年吕惠卿撰并書其隂下方有此三十一大字餘題尚多不録凡碑文必面在先隂在後此碑元豐八年立為乙丑之嵗而隂所題辛亥反在其前十有四年不可曉也豈非惠卿磨去前人之文而自刻之者與其隂嵗月之猶存則固心勞日拙而亦天理之未盡泯者與夫毁人以自成君子之所深戒而今之名公貴人為此者比比也嗟乎古碑之所以多不存于世其不以此也哉霍山中鎮廟宋陳綱詩留題霍山應聖公廟太常博士知晉州陳綱峻極巍峩勢望雄層巒叠嶂翠重重為神有感興唐祚作鎮無疆福晉封材産十州資構厦泉分數邑潤耕農幽巖舊榻髙人隱絶頂遺墳古帝蹤欲雨片雲生峭壁未明先日照危峰斷崖當午晴雷震深壑經秋積靄濃樵去每逢遊洞鹿僧禪時見戲潭龍名光祀典傳千載仰祝牲牢致享恭大中祥符五年六月二十五日岢嵐軍判官鄭世卿書栗再興刻字元趙彀詩謁中鎮崇德應靈王廟詩用宋太常博士陳綱韻凌晨䇿馬趨靈宫縈紆一徑松蘿重兩山對聳忽開豁參差殿閣蒼煙封溪回路轉得平土雲間雞犬存莊農廟庭喬木巢野鶴沙瀨虎蹄遺新蹤仰觀絶頂倚霄漢陪山劍㦸攢羣峰霏霏嵐光翠欲滴深林緑動春意濃包含元氣蓄雷雨巨壑湛蔚藏神龍天香屢降祈年榖有司時祀宜彌恭至正元年秋奉議大夫太常禮儀院判官趙彀謹書知宫武德柔立石建文碑維建文元年嵗次己卯二月壬寅朔二十二日癸亥皇帝遣序班周敖國子監生袁綱致祭于中鎮霍山之神曰豫荷昊天祐命承皇祖丕緒正大寶位統率神人乃正月壬午祗祭上帝于南郊山川百神既與奠享尚以未能特修祀事于祠下為憾是用遣官奉香幣牲醴致祭維神以靈峻之德作鎮中土時出雲雨協相兆民以稱豫懷柔之意焉尚饗後列陪祭官霍州知州等官及執事生員吏典姓名右小石刻一通在霍山中鎮廟西壁上豫行天下見洪武永樂以來祭告嶽瀆之文及它碑記甚多獨未有建文年者意其在位日淺又或文皇御宇之日而臣下之獻諛者從而剷去之也乃此文雜于數十百碑之中而字畫完好無缺故亟録之後之君子每痛國史不存建文一代事蹟無從考證若使通雅之士歷深山窮谷而求之如此碑者世間或尚有一二不止霍山廟也不猶愈于羅永菴之詩程濟史彬之録僞撰而無稽者乎因并書之以告後人之能信古者大周無上孝明髙皇后碑銘并序臣竊聞二儀合德中黃承太紫之庭兩曜齊明玉兔儷金烏之象是以九霄髙映星躔乘婺女之精十野傍羅當作旁羅媯水叶娥皇之德亦有西陵美族闕軒帝之宫南土嘉媒入娉夏王之幄其後太任端一即創文基太姒勤勞還開武運故知皇三事業咸資坤德之功帝五風謡必藉隂靈之化無上孝明髙皇后𢎞農仙掌闕出自有周蓋唐叔虞之後闕原夫赤烏流火丹雀銜書乍開夢梓之祥旋茂翦桐之業自唐郊徙邑晉野裁封即胙土而承家啓禎符而得姓周則志為大將承九代之餘資秦則欵為上卿居七城之重任豈直闕丹轂金莩舄奕於都畿四代白環玉緒蟬聫於海縣子雲博識吐鳳摛詞伯起髙材銜鱣襲祉誕闕不墜降靈相屬神基與紫微爭髙仙派共黃河俱逺所以闕隆鍾鼎闕積衣冠五公則異代相傳八子則殊時閒出詳諸闕可略而言曽祖諱定後魏都督歷新興太原二郡太守并州刺史晉昌穆侯宏材卓犖峻局深沉丹山有象闕之彩緑闕見遺風之步褰帷按俗風行馭竹之郊露冕臨闕化偃焚林之阜豈直鄧攸罷郡深歎雞鳴劉寵辭官方憂犬吠祖諱紹後魏征西將軍金紫光祿大夫兼通直散騎常侍驃騎大將軍周開府儀同三司封儻城郡公鄜幽燕三州刺史贈使持節大將軍成文扶鄧洮五州諸軍事成州刺史諡曰信聲飛漸陸響逸鳴臯器重南金材橫東箭謀深八陳勇冠三軍既隆投石之勳果踐銜珠之秩加以金龜結紐銅虎虎字再見末筆俱短篪字號字亦然分符轉扇揚風停車待雨童兒結要無欺一闕之期親友論刑自得二闕之詠父鄭恭王諱達周內史中大夫隋開府儀同三司黃門內史吏部刑部二侍郎尚書左右丞趙鄯二州刺史工部吏部二尚書納言營東都大監將作大匠武衛將軍左光祿大夫遂寧恭公贈吏部尚書唐贈尚書左僕射垂拱二年封鄭王食邑一萬户依舊諡曰恭即雍州牧司徒觀德王之季弟也量包江海氣逸烟霄文則吕氏春秋武則孫吳兵法箕裘代襲鏘鏘萬石之君禮樂基身翼翼千金之子鸞回玉札雁落雕弓激水張鱗遙浮渤澥摶風理翰直上扶搖纍踐崇階頻升顯秩腰鞬北闕位總貔貅曳履南宫聲髙鵷鷺貂冠入侍氣應連珠隼斾分班榮參執玉加以纍仁鍾祉積德延祥四履開封寵及九泉之路千乘闕禮恩覃萬古之前棠棣相輝鶺鳹交映劉家兩驥譽滿寰中荀氏八龍名髙海內通門向術冠蓋成隂甲第當衢歌鐘就列伏惟無上孝明髙皇后資靈闕魄育粹闕宫承茂祉於瑶筐降仙儀于金屋聲馳草當作丱嵗潜流夢闕之祥譽表笄闕暗積捫闕之貺蘭襟散馥蕙問揚翹懿則重于邦家柔儀冠於今昔忠圖孝範援翠竹而凌霜媛德婉容引青松而冒雪禮枝含秀藻七誡於情田行葉分芳籠九師于性府徽猷內湛韶姿外發懸明鏡于積水之間振青飊于長松之上貞規漢逺亮節秋髙翠樓紅闕從來未重龍梭鳳杼本自多輕簡素鄙􅀈繡之工靜默尚韋編之道明詩習禮豈惟秋菊之銘閲史披圖寧止春椒之頌學標天縱開道德之清關業契生知入文章之妙境曾於方寸具寫千言總遊霧於毫端窮偃波于筆杪芝英雲氣入魏帳而分輝龍爪魚形映張池而散彩嘗題一簡密記貞心置以緘縢藏之屋壁云當使惡無聞於九族善有布于四方指此立身期之必遂後因修宅匠者得之恭王見而歎曰此隆家之女矣昔者書堂欲壞唯聞絲竹之音劍匣將開空覩蛟龍之氣未有仁心暗徹睿德冥通橫宇宙而無違滿乾坤而自應若乃行該闕義孝極闕經親枕席而忘疲候晨昏而靡倦及乎風枝不靜露蓼含哀闕厚闕而無追仰曽穹而莫報思欲託三乘之妙果慿五演之𤣥宗永奉嚴親長栖雅志昔隋季喪亂海內沸騰伏鱉垂闕風塵暗起羣龍戰野旗鼓潜張白騎于是爭驅青犢由之競擾蚩尤則餐沙食石項羽則索鐵申鈎赤眉探盆子之籌黃巾聚闕師之米夫三才合契惟神膺大寶之名大位乘時惟闕運洪爐之德唐髙祖神堯皇帝材雄鵲起業峻龍飛用丹扆而寧闕將朱旗而撥亂闕綱既紐竟牧龍鳯之圖闕角咸清遂翦豺狼之毒無上孝明髙皇帝觀時有作應運而生先知赤伏之言預識黃闕之兆功深坐樹績茂披荆負伊鼎而陳謀入張幃而建䇿龍鈐獨運當赤闕之三千獸節長驅偶皇闕之百六息崑山之巨燎並藉中權定滄海之橫流咸資上䇿志同魚水契若鹽梅如魏武之得荀攸似漢光之逢鄧禹雖英圖盛烈昭鶴鼎於髙門而閫則嬪風闕魚軒於中饋髙祖神堯皇帝位膺元首任切股肱利涉大川寄隆舟楫式崇勳舊為結潘楊酬功草昧之時賞效雲雷之闕髙后以孝誠純至雅操虛沖拒縟禮於移闕誓間襟於闕縣六塵不染孤標水上之花四諦方披獨晤闕中之闕洎乎鳳凰開繇猶堅匪席之心烏鵲成橋果迫如綸之命於是使桂陽公主為婚主禮聘所須並令官給既而三闕叶兆百兩邀歡與松蘿而比茂諧瑟琴而流響風閨少女襲蘭蕙而馳芬月幌仙娥韻珩璜而動步光生綺殿比桃李而增鮮影發春樓視雲霞而掩色八紘欽其雅躅四海挹其鴻徽猶羽翼之宗鸞鳳風雲之隨龍虎者矣廟見斯畢即拜應闕夫闕從班例也于是帝圖肇建王業闕基三户亡秦覺風塵之始定四門闢舜識雷雨之將調闕無鬭闕之妖闕息崩山之禍主上方勤庶政屬想羣黎將貽共理之憂式廣求賢之務無上孝明髙皇帝以勳兼竹帛義重金蘭備歷文武超升內外三踐八元之位四臨九伯之途中臺飛署劔之榮南服總班條之任髙后以業光圖史道叶塤篪欲啓神明實資隂助是以闕海令未發而風移化穆荆衡澤將流而闕悅呼鷹臺下尚隔去思抵鵲巖前始歌來晚俄而髙祖晏駕瞻脫屣而無留太祖崩號奉遺弓而積慕沉綿遽軫終無就闕之期痼疾遄淹忽切乘闕之釁髙后哀深杞堞誓切柏舟悲一劍之先沉怨雙桐之半死昔時寶鏡愴對孤鸞舊日瑶琴悲聞獨鶴銜寃茹痛撫繐帳而增號弔影傷魂踐霜閨而凝慕方祈净業敬託良緣慿慧炬於幽途艤慈舟於覺海于是心持寶偈手寫金言字落貫花詞分半闕龍藏豈及象負難勝將佛日而長懸共慈燈而不滅及龍旌首次􅜹紼遵途永惟慿附之誠願託丘榛之側方冀鵷棲梓樹丘接埏庭鶴舞松枝傍當作旁依隧路特以闕上闕居膝下愛切掌中理藉劬勞方資顧復宣和諭善屢積葭灰闕就闕頻移柘火至永徽六闕上母儀萬闕位六宫將開練當作鍊石之基乃遂頽沙之祉大帝以西京命賞平原之秩未𢎞東漢崇恩新野之封猶褊於是廣流𤣥霈大啓黃扉稽石窖之遺塵裂寶符之闕即以其闕十一闕册拜代闕夫闕食湯沐邑一千户品闕第一位在王公母妻之上魚軒水闕揚輕影于龍池翬服霞明下鮮文於鳳掖榮由德被位匪恩升驟應嘉名徙昭洪澤以顯慶五闕十闕轉拜榮闕夫闕尋改封鄼闕夫闕自家疏槐里門荷椒庭纍沐殊輝頻移茂典南鄰夜闕奏鐘磬于髙臺北里晨通列笙竽于廣榭門有攝珠之客家豐饌玉之㕑恆處逸而思勞每將升而必降緑墀青鎖特忿王根火布金蛇深非梁冀謙撝之美萬國仰而知勤端潔之風九圍欽而取則智周寰宇識洞古今思所以匡闕庇闕濟時軌物嘉謨讜說屢發於神襟厚利豐功頻彰于帝念奏便削藁闕莫能知每以孔光祕言合為闕之道山濤密啓得事宜之要可久可大置黔首於生成惟幾惟深頓蒼元於覆冒至若緣情體物屬事比辭取之以義方先之以風化清詞海富縟藻雲繁凡所著述皆成典訓其動也方其靜也直其恩也若春雨之流津其威也若秋霜之應節接上以禮逮下以仁君子懷其德小人懷其惠闕機獨轉靈臺迥燭虛鑒與日月齊明神理共隂陽比奧洋洋乎不可得而稱也既而離宫霧闢遙橫闕乳之山别館雲開上戴闕眉之宿甘泉避暑方陪萬乘之遊景福追凉更扈六龍之駕不謂災纒霧露疢積膏育丹扆凝慈召名醫而接軫紫霄流渥下珍藥而相望玉釡徒煎竟乏長生之術金丹莫就終無駐夀之期咸亨元闕八闕二闕崩于九成宫之山第春秋九十有二闕上以身躋霄極禮闕晨昏戀隔九重望長筵而下泣心馳五起瞻厚褥而銜悲大帝慮不勝哀祕兹凶問苴筵欲對仍流不次之恩葈服將臨更下非常之澤仍改封衛闕夫闕以諭闕上之憂懸也后疾將大漸闕落髙舂雅志無昏神情不撓影隨燈滅自此長辭魂逐香銷終無暫反以為合葬非古禮貴從宜將追罔極之慈願在先塋之側闕上奉遵遺㫖無忝徽音割同穴之芳規就循陔之懿躅即以其闕庚午閏九闕辛丑朔草一闕辛酉遷座于雍州咸陽縣之洪瀆原鄭恭王舊塋之左禮也爾其郊原坱闕林薄阡眠秦闕關河迥接寶雞之野漢家墳壠平依金狄之川松檟森沈何闕鳥住風煙蕭索幾代闕亡於是凝恨九闕廢朝三闕空山露泣痛結飛行曠野雲愁悲纒草樹乃下制贈魯闕太夫闕諡曰忠烈仍令司刑太常伯盧承慶攝同文闕卿充監護大使右肅機皇甫公義等為副賜東園祕器每事官供務從優厚仍令西臺侍郎道闕公戴至德持節弔祭京官文武九品已上及諸親命婦並赴宅弔哭仍送至渭橋葬事並依王禮給班劔四十闕羽葆鼓吹儀仗送至墓所往還官為立碑親紆御札闕上因心轉切錫類方𢎞希申莫大之懷冀展飾終之請烏墳欲列思增茅土之儀鶴隴將崇願廣山河之誓遂得五雲飛彩墜仙液於松塋十闕回光被曾輝于蒿里乃下制贈太原郡王妃餘如故所司備禮冊命太常親御橫門開軒悲哭紫宸哀痛黃屋凄凉闕為之寢光煙雲由其輟色闕上以幽明永隔屺岵長辭終無再見之因鎮結千秋之恨奔曦已逺薦霜堇而無闕逝水難追饋冰魚而未闕又以嚴規早墜逺卜厝於鄉墳慈䕃重傾近陪親于京壠陵塋眇隔長懸兩闕之悲關塞遙分每切百身之痛遂命大使備法物自昊陵迎魂歸于順陵焉遊冠逺降墜舄遙遷方移沛邑之魂更啓橋山之域白雲朝起乍伴龍輴明闕宵懸時低􅜹衛文明元闕上臨朝其年九闕追尊先妃曰魏王妃食邑一萬户實封加滿五千户改咸陽園寢曰順義陵大名闕啓奧壤闕分古樹捎雲近對黑龍之水荒墳映闕傍當作旁鄰丹鳳之城徽號既崇園陵闕廣屬以圖書河洛龜負鳳銜窗闥方圓雲攢霧矯合宫重屋既布政而嚴禋玉輦金輿且巡河而拜洛永昌元年追尊先妃曰忠孝太后既而謳歌允集獄訟知歸闕垂革命之符闕涌受終之籙元圭錫禹還逢揖讓之闕黑玉歸商即啓休明之運九莖仙草依漢殿而抽芳五色祥雲繞軒營而布彩下從民望上應天心乘寶位於通三建瑶圖于得一黃琮蒼璧祀地郊天復廟重檐宗文祖武鴻名肇創光鳳閫於幽泉茂禮將加飾鸞闈於長夜闕元闕追尊曰孝明髙皇后陵曰順陵復以祥分貝葉瑞演龍花金容開十闕之圖玉相告三空之䜟龍軒黯黯俄為兜率之宫鳳闕岧岧忽似須彌之座金輪既轉玉鏡方懸式詮無上之文闕顯崇親之義長夀二闕后位之上又加無上兩字尋又下制改順陵曰望鳳臺東京故事西漢遺塵封樹空存追崇未廣豈若宸襟鎮結長懷露序之哀睿念恆纒水積霜旻之慕遙瞻鳳野式建嘉名逺望鶉郊長懸美稱且夫功成翼贊尚畫雲臺績擅勳庸猶題麟閣况乎倪闕茂德貫闕殊禎垂母則於寰區導嬪風于邦甸豈可使炎凉暗積陵谷潜移唯栽舞鶴之松不刻盤龍之石闕上凝懷萬化長想千齡恐闕軸之西回懼二關之北轉方圖琬琰式降絲綸永嗟仙鶴之歌用固靈龜之卜微闕攀輝闕樹沐潤闕潢榮忝緑車職兼青史奉先追逺恆積慕於丹誠相質披文忽承恩于紫誥是用恭抽弱思敬述洪猷屑瓦徒勤生金愧妙揮毫奪魄陳萬一而寧窮伏紙驚魂辭再三而不獲逡巡拜首乃作詞云邈矣上古悠哉厥闕回紫府闕轉黃輿隂陽蕩薄闕居諸靈龜負䜟寶鳳銜書其一大位既陳三才乃立帝皇欎起后妃更襲蛟電遙凝虹闕下入渭涘疏派塗山是葺其二明明髙后奕奕輝光白環代欎丹轂家昌靈基嶽峻曽派河長捫闕集祉浴闕開祥其三爰自生育早彰尊貴闕出闕流青龍翠氣金屋是貯玉衣方萃燕卵非竒雞珠寧異其四芝蘭吐葉桃李開花黃雲白氣夜闕朝霞賢明自負仁孝無加曾霄降藥祕篋飛沙其五聰晤闕資惠才神與河漢靈匹瀟湘帝女筆動鸞回絃調鶴儛滌想金闕心寶聚其六仙容婉婉艷質峩峩闕妃恥出闕媛羞過椒花入頌柳絮縈歌詞峰秀嶽學海馳波其七魴鯉成詩鳳凰開兆琴瑟既合室家斯紹兩鶴齊飛雙龍並繞德行方肅言容是闕其八九圍母則六合嬪風恩留海內化被區中銀鐶曉上金闕祥開梓闕位冠椒宫其九習禮明詩披圖閲史漢朝馬鄧周闕妊當作任姒隂化聿宣坤儀闕理貫闕騰瑞驚雷送祉其十髙舂忽墜上夀俄褰當作騫金丹不熟玉釡徒煎黃泉九闕白闕三闕六宫恨積萬闕哀纒其一十一寂寞丘隴凄涼原隰畢闕難追終闕靡及薤露晨闕急伏紙銜悲揮毫灑泣怨闕賢之同盡感昏明之遞襲紀盛德于豐碑冀神猷兮永立其一十二長安二闕嵗次壬寅金闕己巳木朔五闕癸酉金闕建右武后革命時所立順陵碑首曰大周無上孝明髙皇后碑銘并序特進太子賔客監修國史上柱國梁王武三思奉敕撰太子左奉裕率兼檢校安北大都護相王旦奉敕書唐顔真卿蔡州書真卿奉命來此事期未竟止緣忠勤無有旋意然中心恨恨始終不改游于波濤宜得斯報千百年間察真卿心者見此一事知我是行亦足達於時命耳人心無路見時事只天知右唐顔魯公書一通并畫像有題于書之上像之下者曰觀此筆蹟不顯嵗月以事實考之蓋使李希烈時也希烈以建中元年陷汝州盧杞建議遣公奉使至正元元年八月丙戌公不幸遇害困躓賊庭者逾二十年刃加于頸而色不變度無還期誓不易節蓋書此以自表云重既摹公之像於蒲繪而祠之又訪得此石本狀貌老矣公以乾元元年自同徙蒲至奉使時垂三十年氣節不衰而狀貌非昔也乃刻石而置之祠室俾觀者有考焉靖康元年七月壬申朝散郎祕閣修撰知同州軍州事唐重書唐褒封四子敕敕門下昊穹眷命烈祖降靈休昭之儀存乎記典莊子列子文子庚桑子列在真仙體兹虛白師𤣥元之聖教𢎞大道於人寰觀其微言究極精義比夫諸子諒絶等夷其莊子宜依舊號曰南華真人列子號曰沖虛真人文子號曰通𤣥真人庚桑子號曰洞靈真人其四子所著書並隨號稱為真經宣布中外咸使聞知天寶元年二月草日宋頒於莊子牒中書門下闕牒闕莊子并釋文牒奉敕莊叟𤣥言理歸於沖漠郭象為注義造於精微既廣𤣥風實資至治朕仰崇大道俯勸蒸民言念此書盛行於世尚多踳駮已命校讎將永煥於縑緗宜特滋於雕篆牒至准敕故牒景德三年八月五日右諫議大夫參知政事趙兵部侍郎參知政事馮工部尚書平章事王唐李肇國史補曰天寶中天下屢言聖祖見因以四子列學官故有僞為庚桑子者其辭鄙俚非聖賢書劉汾詩𤣥談密授函關吏萬古終南一草樓陵谷依然人世換冷烟叢柏卧青牛劉汾右說經臺之左有碑前為老子函谷度關圖元大德庚子刻後為希聲堂碑八分書延祐二年朱象先撰而此詩則在碑之左旁亦八分書不著年月詳其風致當為元人之作草樓之前傳有老子繫牛柏後人琢二石牛置其下故末句云然永夀王詩隱隱樓臺雲外重一溪活水過仙宫上師已化青牛老萬木驚秋墜晚風正德己卯仲秋下旬九日豫蒙聖上准奏容浴溫泉便道樓觀既出乃登說經臺但見白鶴飛空蒼松夾道豫喜不勝又覩欽差鎮陜劉內輔公佳製不揣僣鄙强和一絶以發一時之興耳永夀王題并書後有印文曰永夀王章漢曹全碑君諱全字景完敦煌效穀人也其先蓋周之胄武王秉乾之機剪伐殷商既定爾勳福祿攸同封弟叔振鐸于曹國因氏焉秦漢之際曹參夾輔王室世宗廓土斥境子孫遷于雍州之郊分止右扶風或在安定或處武都或家隴西或居燉煌枝分葉布所在為雄君髙祖父敏舉孝廉武威長史巴郡朐忍令張掖居延都尉曾祖父述孝廉謁者金城長史夏陽令蜀郡西部都尉祖父鳳孝廉張掖屬國都尉丞右扶風隃麋侯相金城西部都尉北地太守父琫少貫名州郡不幸早世是以位不副德君童齔好學甄極毖緯無文不綜賢孝之性根生於心收養季祖母供事繼母先意承志存亡之敬禮無遺闕是以鄉人為之諺曰重親致歡曹景完易世載德不隕其名及其從政清擬夷齊直慕史魚歷郡右職上計掾史仍辟涼州常為治中别駕紀綱萬里朱紫不謬出典諸郡彈枉糾邪貪暴洗心同僚服德逺近憚威建寧二年舉孝廉除郎中拜西域戊部司馬時疏勒國王和德弒父篡位不供職貢君興師征討有吮膿之仁分醪之惠攻城野戰謀若涌泉威牟諸賁和德面縳歸死還師振旅諸國禮遺且二百萬悉以簿官遷右扶風槐里令遭同産弟憂棄官續遇禁罔潜隱家巷七年光和六年復舉孝廉七年三月除郎中拜酒泉祿福長訞賊張角起兵幽冀兖豫荆揚同時並動而縣民郭家等復造逆亂燔燒城寺萬民騷擾人懷不安三郡告急羽檄仍至于時聖主咨諏羣僚咸曰君哉轉拜郃陽令收合餘燼芟夷殘迸絶其本根遴訪故老商量俊艾王敞王畢等恤民之要存慰髙年撫育鰥寡以家錢糴米粟賜癃盲大女挑婓等合匕首藥神明膏親至離亭部吏王宰程橫等賦與有疾者咸蒙瘳快惠政之流甚于置郵百姓襁負反者如雲戢治牆屋市肆列陳風雨時節嵗獲豐年農夫織婦百工戴恩縣前以河平元年遭白茅谷水灾害退於戌亥之間興造城郭是後舊姓及修身之士官位不登君乃閔縉紳之徒不濟開南寺門承望華嶽鄉明而治庶使學者李儒欒規程寅等各獲人爵之報廓廣聽事官舍廷曹廊閣升降揖讓朝覲之階費不出民役不干時門下掾王敞録事掾王畢主簿王歷户曹掾秦尚功曹史王顓等嘉慕奚斯考甫之美乃共刋石紀功其辭曰懿明后德義章貢王庭征鬼方威布列安殊荒還師旅臨槐里感孔懷赴喪紀嗟逆賊燔城市特受命理殘圯芟不臣寧黔首繕官寺開南門闕嵳峩望華山鄉明治惠沾渥吏樂政人給足君髙升極鼎足中平二年十月丙辰造宋神宗詩賜彥博彥字上用御書之寶四紀忠勞著三朝聞望隆享兹難老祉報在不言功富矣勳彌大居焉貌甚冲西都舊士女白首􅀈瞻公文潞公記御賜詩記元豐三年季秋皇帝行大饗之禮於明堂臣方守魏被召侍祠大禮慶成後四日特蒙制恩進位太尉保釐洛郊臣犬馬之年七十有五前此纍年章十數上以求致仕聖慈俯憐舊物曲念老臣皆未之許今復優進公位俾守别都自顧衰殘非敢充當俯伏辭遜至於再三訖不獲命乃以閏月二十三日陛辭翌日出都仍賜宴于瓊林苑悉以二府大臣押伴既又臨遣中使內出寶器俾釂天醴以極魚藻之樂及賜御詩以寵其行臣伏思䝉厚恩荷殊渥自近世逮本朝來未有其比則有弼臣惇奉詔作序事義詳矣臣雖窮極語言不能盡意惟知負戴天地生成之德感極而繼之以泣恭惟陛下聰明睿智煥乎有文帝庸作歌光紹前典伏自臨御以來十有四載而英韶之韻雲漢之章百執願聞萬物思覩者久矣曾未之得夫何老臣首䝉天賜至榮至幸超絶等倫始在都門則已布傳於宫省尋抵洛宅又得珍示於吏民是用圖金刻石以永其傳將與日月齊明天地同久復使臣之子子孫孫相繼率勵保之守之亦克永世至於老臣為不朽矣元豐四年正月三日河東節度管內觀察處置等使守太尉開府儀同三司行太原尹判河南府事西京留守司公事兼畿內勸農使上柱國潞國公食邑二萬三千六百尸食實封一萬一百户臣文彥博謹記金王庭筠詩帝遣名山護此邦千家瑟瑟嵌西窗山僧乞與山前地招客先開四十雙四十字作卌四畝為雙輟耕録挂鏡臺西挂玉龍半山飛雪舞天風寒雲直上三千尺人道髙歡避暑宫王母祠東古佛堂人傳棟宇自隋唐年深寺廢無僧住滿谷西風栗葉黃手拄一條青玉杖真成日掛百錢游夕陽欲下山更好深林無人不可留右在汾州府學宫凡四通其未云黃華老人王庭筠行草四詩刻石於汾之學宫者殆五百年矣嵗久石泐字畫漫漶嘉靖乙丑之秋分守左參政餘姚宋公嶽省覽咨惜令州守王大經同知趙崇儒别礱石四靣以新安儒生程本模勒判官楊守公經理刻成仍增置一庭貯之庭筠書號稱墨妙幾廢之餘逢此翻繕煥若神明頓還舊觀矣郡人孔天允記志云黃華老人王庭筠字子瑞金大定十六年進士官至翰林修撰嘗買田林慮讀書黃華山寺因自號焉父遵古為汾州觀察使判官省親至此行書詩石二面史稱書法學米元章端雅過之司馬公祠堂詩司馬晉州待制哀辭太常博士通判延州軍州事馬端志古流難合談髙道自明風波直恩分公為郡牧倅當曽之遷也人以公始嘗堅辭其辟當自為辨公惻然謝曰今日正宜從其行也卒不以辨識者韙之針石盡交情公與人交必盡規諌始若不勝其言退則敦義彌篤讓節蒙知厚公在鳳翔日被召知諫院公力辭之自是深簡上心焉華班絶綺榮公生平特立至為侍從皆出宸選賤生懷感遇當路假晶熒端辱公以八使慰薦遂蒙改官纍次青油幕端在益昌及岐下皆預賔席中閒白玉京吏文容議緩端在幕府每奉公議特被優假邦事恤言輕戊寅年端輒奏疏論事公時在京師嘗見憫孤直自此嗟流梗何期苦見兵是嵗别公出宰郾城明年移倅邉郡塞垣心易動漳浦信彌驚今春得三堂信知公屬疾玉蘂悲無驗金臺望忽傾嵗䦨雲慘淡天迥淚縱橫世有真忠亮今亡至直清舊僚知葬日投此弔佳城嘉祐元年十月三十日著作佐郎管勾河東路機宜文字雷憲書右小石刻在夏縣司馬公祠堂西館中謁司馬溫國公墓詩并序豫到官之五日拜司馬溫國文正公墓顧瞻良久而有是詩實至元改元閏十二月既望也洞羊後學范庸頓首書蒼蒼中條山悠悠涑河水哲人生其間而有司馬氏山水秀且明桑梓故鄉里宋朝入相時天下聞之喜通鑑一編書名分盡乎禮天地大是非以禮為綱紀大哉君臣道逆順合條理遂令千載下驚懼良有以禹都鳴條岡丘墳峙髙壘大儒世臣家何處孫與子我時來瞻拜昆仲沒荆杞考古詢寺僧懷賢心未已黨人仆其碑今日果誰耻杏花䕃龜趺異事入青史細讀東坡銘文章剩褒美回首悲風來商聲振林起大元至元四年四月九日餘慶禪院尊宿僧行選立石右小石刻與馬端詩同嵌一壁求古録
